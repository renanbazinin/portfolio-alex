# Local development database. Mapped to host port 5433 to avoid colliding with
# a native Postgres on 5432. Start with: docker compose up -d
services:
  db:
    image: postgres:17
    container_name: alex-portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: alex_portfolio
    ports:
      - "5433:5432"
    volumes:
      - alex_portfolio_pgdata:/var/lib/postgresql/data

volumes:
  alex_portfolio_pgdata:
